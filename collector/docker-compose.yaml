# Quick-start: OTel Collector + Jaeger for development
#
# Lightweight local observability — no ClickHouse, no SigNoz.
# Traces viewable in Jaeger UI at http://localhost:16686
#
# Usage:
#   cd collector/
#   docker compose up -d
#
# Then run Tumult:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 tumult run experiment.toon

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-dev.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.56
    ports:
      - "16686:16686"  # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
