# cargo-deny configuration for the Tumult workspace.
# Run with: cargo deny check

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

# RUSTSEC-2023-0071: Marvin Attack timing side-channel in the `rsa` crate.
# Pulled in transitively via `internal-russh-forked-ssh-key` (a vendored fork inside
# russh 0.59). No fixed version exists. Mitigated by disabling the `rsa` feature on
# our direct `russh` dependency — tumult-ssh uses only Ed25519/ECDSA via aws-lc-rs,
# so the vulnerable RSA code path is unreachable at runtime.
# Re-evaluate when russh ships a version that removes or patches the rsa dep.
[[advisories.ignore]]
id = "RUSTSEC-2023-0071"

[licenses]
unlicensed = "deny"
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
