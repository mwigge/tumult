name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest

          # Linux (GNU — x86_64 only, ARM64 uses musl for DuckDB compat)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          # Linux (musl — fully static)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.8
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Run tests before release
        if: ${{ !matrix.cross }}
        run: cargo test --workspace

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p tumult-cli

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p tumult-cli

      - name: Strip binary (Linux)
        if: contains(matrix.target, 'linux') && !matrix.cross
        run: strip target/${{ matrix.target }}/release/tumult

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple')
        run: strip target/${{ matrix.target }}/release/tumult

      - name: Package
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ARCHIVE="tumult-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp target/${{ matrix.target }}/release/tumult "${ARCHIVE}/"
          cp README.md CHANGELOG.md LICENSE "${ARCHIVE}/" 2>/dev/null || true
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: tumult-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  docker:
    name: Publish tumult image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: .
          file: docker/Dockerfile.tumult
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tumult:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/tumult:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm ghcr.io/${{ github.repository_owner }}/tumult:${{ steps.version.outputs.version }} --version

  docker-mcp:
    name: Publish tumult-mcp image
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: .
          file: docker/Dockerfile.tumult-mcp
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tumult-mcp:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/tumult-mcp:latest
          build-args: |
            BASE=ghcr.io/${{ github.repository_owner }}/tumult:${{ steps.version.outputs.version }}

      - name: Smoke test
        run: |
          # The tumult-mcp image has ENTRYPOINT [tumult-mcp, --transport, http],
          # so we override to run the tumult CLI binary that's also in the image.
          docker run --rm --entrypoint tumult ghcr.io/${{ github.repository_owner }}/tumult-mcp:${{ steps.version.outputs.version }} --version

  release:
    name: Create Release
    needs: [build, docker, docker-mcp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: artifacts/

      - name: Collect tarballs
        run: |
          mkdir -p release/
          find artifacts/ -name '*.tar.gz' -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: |
            release/*.tar.gz
            release/SHA256SUMS.txt
          body: |
            ## Docker Images

            Both images contain the full Tumult platform: CLI + MCP server, all 10 plugins (48 actions), examples, and GameDay definitions.

            | Image | Description | Pull |
            |-------|-------------|------|
            | `tumult` | CLI tool (default entrypoint) | `docker pull ghcr.io/mwigge/tumult:${{ steps.version.outputs.version }}` |
            | `tumult-mcp` | MCP server (HTTP/SSE mode) | `docker pull ghcr.io/mwigge/tumult-mcp:${{ steps.version.outputs.version }}` |

            ```bash
            # Run CLI commands
            docker run ghcr.io/mwigge/tumult:${{ steps.version.outputs.version }} discover
            docker run ghcr.io/mwigge/tumult:${{ steps.version.outputs.version }} --help

            # Start MCP server
            docker run -p 3100:3100 ghcr.io/mwigge/tumult-mcp:${{ steps.version.outputs.version }}

            # Or use the CLI image with MCP entrypoint override
            docker run -p 3100:3100 ghcr.io/mwigge/tumult:${{ steps.version.outputs.version }} tumult-mcp --transport http
            ```

            ## Binary Downloads

            See assets below. One-liner install:
            ```bash
            curl -fsSL https://github.com/mwigge/tumult/releases/download/v${{ steps.version.outputs.version }}/tumult-v${{ steps.version.outputs.version }}-$(uname -m | sed 's/arm64/aarch64/')-apple-darwin.tar.gz | tar xz && sudo mv tumult-*/tumult /usr/local/bin/
            ```
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
