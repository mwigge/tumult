version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      opentelemetry:
        patterns:
          - "opentelemetry*"
          - "tracing-opentelemetry"
      arrow-parquet:
        patterns:
          - "arrow"
          - "parquet"
          - "duckdb"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
