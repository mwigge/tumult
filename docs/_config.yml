title: Tumult
description: Rust-native chaos engineering for modern distributed systems
url: "https://mwigge.github.io"
baseurl: "/tumult"

remote_theme: just-the-docs/just-the-docs@v0.10.1

# Site settings
logo: "/assets/images/tumult.png"
favicon_ico: "/assets/images/favicon.ico"

# Navigation
nav_sort: case_insensitive

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Colour scheme
color_scheme: dark

# Footer
footer_content: "Tumult is open source under the Apache-2.0 license."

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Exclude from build
exclude:
  - "*.drawio"
  - "architecture/"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
