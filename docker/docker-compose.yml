# Tumult E2E Chaos Targets
#
# Infrastructure services that experiments run against.
# Start alone for minimal testing, or combine with the
# observability stack for the full platform experience.
#
# Usage:
#   cd docker/
#   docker compose up -d                         # chaos targets only
#   docker compose -f docker-compose.yml \
#     -f docker-compose.observability.yml up -d   # full platform
#
# Ports use 1xxxx range to avoid conflicts with local services.

services:
  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: tumult
      POSTGRES_PASSWORD: tumult_test
      POSTGRES_DB: tumult_test
    volumes:
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tumult -d tumult_test"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - tumult-e2e

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - tumult-e2e

  # ── Kafka 3.8 (KRaft — no ZooKeeper) ────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: tumult-test-cluster-001
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tumult-e2e

  # ── SSH Server (for remote execution testing) ────────────────
  sshd:
    build:
      context: .
      dockerfile: Dockerfile.sshd
    ports:
      - "12222:22"
    healthcheck:
      test: ["CMD-SHELL", "ssh-keyscan -p 22 localhost >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tumult-e2e

networks:
  tumult-e2e:
    name: tumult-e2e
