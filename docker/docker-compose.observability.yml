# Tumult Observability Platform
#
# SigNoz (traces + metrics + logs) + OTel Collector (infra scraping).
# This is the shippable, persistent observability solution.
#
# Can be used standalone or combined with chaos targets:
#
#   # Full platform (chaos targets + observability)
#   docker compose -f docker-compose.yml \
#     -f docker-compose.observability.yml up -d
#
#   # Observability only (connect your own targets)
#   docker compose -f docker-compose.observability.yml up -d
#
# Optional classic profile (Jaeger + Prometheus + Grafana):
#   docker compose -f docker-compose.yml \
#     -f docker-compose.observability.yml --profile classic up -d
#
# UIs:
#   SigNoz:     http://localhost:13301  (default — traces, metrics, logs, dashboards)
#   Jaeger:     http://localhost:16686  (classic profile)
#   Grafana:    http://localhost:13000  (classic profile)
#   Prometheus: http://localhost:19090  (classic profile)
#
# License: SigNoz core is MIT. See https://github.com/SigNoz/signoz

services:
  # ══════════════════════════════════════════════════════════════
  # DEFAULT: SigNoz — unified traces + metrics + logs
  # ══════════════════════════════════════════════════════════════

  # ── SigNoz ZooKeeper (required by ClickHouse) ───────────────
  signoz-zookeeper:
    image: signoz/zookeeper:3.7.1
    volumes:
      - signoz-zookeeper-data:/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tumult-e2e

  # ── SigNoz ClickHouse (telemetry storage) ───────────────────
  signoz-clickhouse:
    image: clickhouse/clickhouse-server:24.1.2-alpine
    volumes:
      - signoz-clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      signoz-zookeeper:
        condition: service_healthy
    environment:
      CLICKHOUSE_DB: signoz_traces
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    networks:
      - tumult-e2e

  # ── SigNoz OTel Collector (custom, writes to ClickHouse) ────
  signoz-otel-collector:
    image: signoz/signoz-otel-collector:0.102.12
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-signoz.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    networks:
      - tumult-e2e

  # ── SigNoz Backend + Frontend ───────────────────────────────
  signoz:
    image: signoz/signoz:v0.117.1
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-otel-collector:
        condition: service_started
    ports:
      - "13301:8080"
    environment:
      SIGNOZ_CLICKHOUSE_HOST: signoz-clickhouse
      SIGNOZ_CLICKHOUSE_PORT: 9000
    networks:
      - tumult-e2e

  # ══════════════════════════════════════════════════════════════
  # Tumult OTel Collector — OTLP gateway + infrastructure scraper
  # ══════════════════════════════════════════════════════════════

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-e2e.yaml:/etc/otel-collector-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "14317:4317"   # OTLP gRPC (Tumult sends here)
      - "14318:4318"   # OTLP HTTP
    depends_on:
      signoz-otel-collector:
        condition: service_started
    networks:
      - tumult-e2e

  # ══════════════════════════════════════════════════════════════
  # CLASSIC PROFILE: Jaeger + Prometheus + Grafana
  # Activate with: --profile classic
  # ══════════════════════════════════════════════════════════════

  jaeger:
    image: jaegertracing/all-in-one:1.56
    profiles: ["classic"]
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tumult-e2e

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["classic"]
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - tumult-e2e

  grafana:
    image: grafana/grafana:10.4.0
    profiles: ["classic"]
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=tumult
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - tumult-e2e

volumes:
  signoz-zookeeper-data:
  signoz-clickhouse-data:

networks:
  tumult-e2e:
    name: tumult-e2e
