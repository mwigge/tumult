# Tumult Observability Platform
#
# SigNoz standalone (all-in-one) + Tumult OTel Collector.
#
# Architecture:
#   Tumult CLI → tumult-collector (:14317)
#     → SigNoz standalone (:4317) → signoz_index_v3 → SigNoz UI (:3301)
#     → ClickHouse (otel_traces — standard schema for DuckDB/analytics)
#     → File export (JSONL for offline analysis)
#     → Prometheus (host + APM span metrics on :18889)
#
# Usage:
#   # Full platform (chaos targets + observability)
#   docker compose -f docker-compose.yml \
#     -f docker-compose.observability.yml up -d
#
#   # Observability only
#   docker compose -f docker-compose.observability.yml up -d
#
# UIs:
#   SigNoz:     http://localhost:3301   (traces, metrics, logs, dashboards)
#   Prometheus: http://localhost:18889  (tumult-collector host + APM metrics)
#   Health:     http://localhost:13133  (tumult-collector health)
#
# First run: SigNoz will ask you to create an account (local, no external auth).
#
# Optional classic profile (Jaeger + Prometheus + Grafana):
#   docker compose -f docker-compose.yml \
#     -f docker-compose.observability.yml --profile classic up -d

services:
  # ══════════════════════════════════════════════════════════════
  # SigNoz Standalone — all-in-one (ZooKeeper + ClickHouse +
  # Schema Migrator + OTel Collector + UI)
  # ══════════════════════════════════════════════════════════════

  signoz:
    image: ghcr.io/aetherall/signoz-standalone:latest
    ports:
      - "3301:8080"    # SigNoz UI
      - "4317:4317"    # OTLP gRPC (SigNoz collector)
      - "4318:4318"    # OTLP HTTP
    volumes:
      - signoz-clickhouse-data:/var/lib/clickhouse
      - signoz-data:/var/lib/signoz
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    networks:
      - tumult-e2e

  # ══════════════════════════════════════════════════════════════
  # Tumult OTel Collector — custom-built with ocb
  # ══════════════════════════════════════════════════════════════
  #
  # Adds on top of SigNoz:
  #   - Standard otel_traces in ClickHouse (for DuckDB cross-query)
  #   - File export (JSONL for offline analysis)
  #   - Prometheus endpoint (host metrics + APM span metrics)
  #   - Host metrics + Docker stats receivers
  #
  # Tumult CLI sends to this collector on :14317.
  # This collector forwards to SigNoz on :4317.

  tumult-collector:
    image: tumult-otel-collector:latest
    build:
      context: ./tumult-collector
      dockerfile: Dockerfile
    volumes:
      - ./tumult-collector/config.yaml:/etc/otel/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - tumult-export:/var/tumult/export
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:13133/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    ports:
      - "14317:4317"   # OTLP gRPC (Tumult sends here)
      - "14318:4318"   # OTLP HTTP
      - "14319:4319"   # OTel Arrow gRPC
      - "18889:8889"   # Prometheus metrics (host + APM)
      - "18888:8888"   # Collector self-telemetry
      - "13133:13133"  # Health check
    depends_on:
      signoz:
        condition: service_healthy
    environment:
      CLICKHOUSE_ENDPOINT: "tcp://signoz:9000"
      SIGNOZ_ENDPOINT: "signoz:4317"
    networks:
      - tumult-e2e

  # ══════════════════════════════════════════════════════════════
  # CLASSIC PROFILE: Jaeger + Prometheus + Grafana (optional)
  # Activate with: --profile classic
  # ══════════════════════════════════════════════════════════════

  jaeger:
    image: jaegertracing/all-in-one:1.56
    profiles: ["classic"]
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tumult-e2e

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["classic"]
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - tumult-e2e

  grafana:
    image: grafana/grafana:10.4.0
    profiles: ["classic"]
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=tumult
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - tumult-e2e

volumes:
  signoz-clickhouse-data:
  signoz-data:
  tumult-export:

networks:
  tumult-e2e:
    name: tumult-e2e
