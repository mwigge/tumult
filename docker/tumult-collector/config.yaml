# Tumult OTel Collector — Production Configuration
#
# Receives telemetry from Tumult CLI and infrastructure, exports to:
#   - ClickHouse (persistent trace storage, standard otel_traces schema)
#   - File (JSONL for DuckDB ingestion)
#   - Prometheus (host metrics + APM span-derived RED metrics)
#
# Signals: traces, metrics, logs
#
# Environment variable overrides:
#   CLICKHOUSE_ENDPOINT  — ClickHouse native protocol (default: tcp://signoz-clickhouse:9000)
#   SIGNOZ_ENDPOINT      — Forward to SigNoz collector (optional, for SigNoz profile)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  otelarrow:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4319

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      load: {}
      network: {}
      filesystem: {}

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
      resource_attributes:
        host.id:
          enabled: true

  attributes/tumult:
    actions:
      - key: collector.name
        value: tumult-otel-collector
        action: upsert

exporters:
  # ClickHouse — standard OTel schema (otel_traces table)
  # Coexists with SigNoz's signoz_index_v3 in the same database
  clickhouse:
    endpoint: ${env:CLICKHOUSE_ENDPOINT:-tcp://signoz:9000}
    database: signoz_traces
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
    sending_queue:
      enabled: true
      queue_size: 100

  # File — JSONL for DuckDB ingestion pipeline
  file/traces:
    path: /var/tumult/export/traces.jsonl
    format: json

  file/metrics:
    path: /var/tumult/export/metrics.jsonl
    format: json

  # Prometheus — host + APM metrics for scraping
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

  # OTLP forward — send to SigNoz OTel Collector for signoz_index_v3
  otlp/signoz:
    endpoint: ${env:SIGNOZ_ENDPOINT:-signoz:4317}
    tls:
      insecure: true

  # Debug — development logging
  debug:
    verbosity: basic

connectors:
  # APM: Derive RED metrics (Rate, Errors, Duration) from traces
  spanmetrics:
    histogram:
      explicit:
        buckets: [1ms, 5ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1s, 5s, 10s]
    dimensions:
      - name: resilience.experiment.title
      - name: resilience.action.name
      - name: resilience.fault.type
    exemplars:
      enabled: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]

  pipelines:
    # Traces: OTLP/Arrow -> ClickHouse + SigNoz + file + APM metrics
    traces:
      receivers: [otlp, otelarrow]
      processors: [memory_limiter, resourcedetection, attributes/tumult, batch]
      exporters: [clickhouse, otlp/signoz, file/traces, debug, spanmetrics]

    # Metrics: OTLP/Arrow + host metrics -> SigNoz + Prometheus + file
    metrics:
      receivers: [otlp, otelarrow, hostmetrics]
      processors: [memory_limiter, resourcedetection, attributes/tumult, batch]
      exporters: [otlp/signoz, prometheus, file/metrics]

    # APM: Span-derived RED metrics -> Prometheus
    metrics/spanmetrics:
      receivers: [spanmetrics]
      processors: [batch]
      exporters: [prometheus]

    # Logs: OTLP -> SigNoz + file
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, attributes/tumult, batch]
      exporters: [otlp/signoz, file/traces, debug]

  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
