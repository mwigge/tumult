# Prometheus config for Tumult e2e infrastructure observability.
# Scrapes the OTel Collector's Prometheus exporter endpoint.

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          environment: tumult-e2e
